apiVersion: cluster.x-k8s.io/v1beta2
kind: Cluster
metadata:
  name: vks-auto-01
  namespace: vks-automation
spec:
  clusterNetwork:
    # ⚠️ pod CIDR 不可與 lab 管理網段 192.168.114.0/24（Supervisor API .132 / DNS+NTP .200 / gw .254）
    #    或 VPC CIDR（172.28/29/30）重疊。預設 192.168.0.0/16 會蓋掉 192.168.114.x → CP node 連不到
    #    DNS/registry/Supervisor → 永遠 not Ready → MHC 砍掉重建（remediation loop）。改用 100.96.0.0/11。
    services:
      cidrBlocks: ["10.96.0.0/12"]
    pods:
      cidrBlocks: ["100.96.0.0/11"]
    serviceDomain: "cluster.local"
  topology:
    classRef:
      name: builtin-generic-v3.6.0
      namespace: vmware-system-vks-public
    version: "v1.34.2"
    controlPlane:
      replicas: 1
    workers:
      machineDeployments:
        - class: node-pool
          name: node-pool-1
          replicas: 1
    variables:
      - name: vmClass
        value: best-effort-small
      - name: storageClass
        value: management-storage-policy-single-node
